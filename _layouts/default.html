<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    /* theme init before first paint (no flash): stored choice, else system */
    (function () {
      try {
        var t = localStorage.getItem("sml_theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <title>{% if page.title %}{{ page.title }} · Slow Mandarin Lab{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/logo.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  {% if page.youtube_id %}
  <meta property="og:type" content="video.other">
  <meta property="og:image" content="https://i.ytimg.com/vi/{{ page.youtube_id }}/hqdefault.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://i.ytimg.com/vi/{{ page.youtube_id }}/hqdefault.jpg">
  {% else %}
  <meta property="og:image" content="{{ '/assets/img/logo.png' | absolute_url }}">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img class="brand-logo" src="{{ '/assets/img/logo.png' | relative_url }}" alt="Slow Mandarin Lab logo — 慢">
        <span class="brand-name">Slow&nbsp;Mandarin&nbsp;Lab</span>
        <span class="brand-chip">Study&nbsp;Notes</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Episodes</a>
        <a class="nav-yt" href="https://www.youtube.com/@SlowMandarinLab" target="_blank" rel="noopener"
           aria-label="YouTube"><span class="nav-yt-full">YouTube&nbsp;↗</span><span class="nav-yt-icon"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.4v13.2a.5.5 0 0 0 .76.43l10.5-6.6a.5.5 0 0 0 0-.86L8.76 4.97a.5.5 0 0 0-.76.43z"/></svg></span></a>
        <button type="button" class="theme-toggle" title="Light / dark theme" aria-label="Toggle light or dark theme">🌙</button>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="wrap">
      <p class="foot-zh">慢慢来，比较快。 <span class="foot-zh-en">— Take it slow; it's faster.</span></p>
      <p class="foot-links">
        <a href="https://www.youtube.com/@SlowMandarinLab" target="_blank" rel="noopener"><svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.4v13.2a.5.5 0 0 0 .76.43l10.5-6.6a.5.5 0 0 0 0-.86L8.76 4.97a.5.5 0 0 0-.76.43z"/></svg> YouTube</a> ·
        <a href="https://open.spotify.com/show/033Llgmynn7dS3qmLspdA2" target="_blank" rel="noopener"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 14v-2a9 9 0 0 1 18 0v2"/><rect x="3" y="14" width="4" height="6" rx="2"/><rect x="17" y="14" width="4" height="6" rx="2"/></svg> Spotify</a> ·
        <a href="https://buymeacoffee.com/bowang168" target="_blank" rel="noopener"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><path d="M6 2v2M10 2v2M14 2v2"/></svg> Buy me a coffee</a>
      </p>
      <p class="foot-small">© Slow Mandarin Lab · Free for personal study — link here rather than re-posting.</p>
    </div>
  </footer>
  <script src="{{ '/assets/js/pinyin.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/study.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script src="{{ '/assets/js/study-ui.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
