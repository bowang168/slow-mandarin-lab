<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · Slow Mandarin Lab{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/logo.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  <meta property="og:image" content="{{ '/assets/img/logo.png' | absolute_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img class="brand-logo" src="{{ '/assets/img/logo.png' | relative_url }}" alt="Slow Mandarin Lab logo — 慢">
        <span class="brand-name">Slow&nbsp;Mandarin&nbsp;Lab</span>
        <span class="brand-chip">Study&nbsp;Notes</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Episodes</a>
        <a class="nav-yt" href="https://www.youtube.com/@SlowMandarinLab" target="_blank" rel="noopener">YouTube&nbsp;↗</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="wrap">
      <p class="foot-zh">慢慢来，比较快。</p>
      <p>Slow enough to follow. Complete enough to use. —
        <a href="https://www.youtube.com/@SlowMandarinLab" target="_blank" rel="noopener">@SlowMandarinLab</a></p>
      <p class="foot-small">© Slow Mandarin Lab · Free for personal study — please link to these pages rather than
        re-posting.</p>
    </div>
  </footer>
  <script src="{{ '/assets/js/study.js' | relative_url }}"></script>
</body>
</html>
