---
layout: default
---
<main class="wrap">
  <p class="crumbs"><a href="{{ '/' | relative_url }}">← All episodes</a></p>
  <article class="page">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.youtube_id %}
    <div class="video-embed">
      <iframe src="https://www.youtube-nocookie.com/embed/{{ page.youtube_id }}"
              title="{{ page.title }} — Slow Mandarin Lab on YouTube"
              loading="lazy" allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <p class="video-hint">▶ Play the episode, then scroll — the audio keeps going while you read along.</p>
    {% endif %}
    {{ content }}
  </article>
  <p class="crumbs bottom"><a href="{{ '/' | relative_url }}">← All episodes</a> ·
    <a href="https://www.youtube.com/@SlowMandarinLab" target="_blank" rel="noopener">Watch on YouTube ↗</a></p>
</main>
